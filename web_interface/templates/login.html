{% extends "card.html" %}

{% block title %}log in{% endblock %}

{% block card_content %}
    <h2>Friend-E</h2>
    <p class="subtitle">Welcome back your friend is waiting</p>
    <form method="POST">
      <input type="email" name="email" id="email" placeholder="Email" required />
      <input type="password" name="password" id="password" placeholder="Password" required />
      <button type="submit">Log in</button>
                <p class="error-msg" id="error">{{ error if error }}</p>
    </form>

    <p class="link-text">
      dont have an account?<a href="{{ url_for('auth.signUp') }}"> sign up</a>
    </p>

{% endblock %}
